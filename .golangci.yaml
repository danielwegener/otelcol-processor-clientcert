linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    - gosimple
    - bodyclose
    - noctx

linters-settings:
  misspell:
    locale: US

issues:
  exclude-rules:
    # Test helpers don't need to check all errors
    - path: _test\.go
      linters: [errcheck]
